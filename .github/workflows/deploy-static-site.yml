name: WordPress to Static Site Deploy

on:
  workflow_dispatch:        # Manual trigger
  repository_dispatch:      # Webhook trigger
    types: [wordpress-update]

# Prevent concurrent runs of this workflow
concurrency:
  group: wordpress-static-site-deploy
  cancel-in-progress: false  # Don't cancel running jobs, wait for completion

jobs:
  spell-check:
    runs-on: self-hosted
    needs: [build-and-deploy]  # Run after deploy so the heavy build doesn't share the runner (#11)
    timeout-minutes: 15  # Prevent hanging spell checks
    continue-on-error: true  # Don't fail the workflow if spell check fails
    steps:
    - name: Validate required environment variables
      run: |
        echo "🔍 Validating required environment variables..."
        MISSING_VARS=()
        
        # Check for required secrets
        if [ -z "${{ secrets.WP_AUTH_TOKEN }}" ]; then
          MISSING_VARS+=("WP_AUTH_TOKEN")
        fi
        
        if [ -z "${{ secrets.OLLAMA_API_CREDENTIALS }}" ]; then
          MISSING_VARS+=("OLLAMA_API_CREDENTIALS")
        fi
        
        # Report results
        if [ ${#MISSING_VARS[@]} -gt 0 ]; then
          echo "❌ Missing required environment variables:"
          for var in "${MISSING_VARS[@]}"; do
            echo "  - $var"
          done
          echo ""
          echo "📝 Please configure these secrets in repository settings:"
          echo "   Settings > Secrets and variables > Actions"
          exit 1
        else
          echo "✅ All required environment variables are set"
          echo "  ✓ WP_AUTH_TOKEN"
          echo "  ✓ OLLAMA_API_CREDENTIALS"
        fi
    
    - name: Checkout repository
      uses: actions/checkout@v5
      with:
        fetch-depth: 0  # Fetch full history
      
    - name: Restore spell check cache
      uses: actions/cache@v5
      with:
        path: .last_spell_check_timestamp
        key: spell-check-${{ github.sha }}
        restore-keys: |
          spell-check-
      
    - name: Install dependencies
      run: |
        # pip and system packages already installed by build-and-deploy on this runner (#14)
        echo "🔧 Ensuring Python dependencies are installed..."
        python3 -m pip install -r requirements.txt --break-system-packages --quiet

    - name: Run spell check
      env:
        WP_AUTH_TOKEN: ${{ secrets.WP_AUTH_TOKEN }}
        OLLAMA_API_CREDENTIALS: ${{ secrets.OLLAMA_API_CREDENTIALS }}
        OLLAMA_URL: https://ollama.jameskilby.cloud
        OLLAMA_MODEL: llama3.1:8b
      run: |
        echo "📝 Running spell check on modified posts..."
        
        # Read last check timestamp from file (if exists)
        TIMESTAMP_FILE=".last_spell_check_timestamp"
        if [ -f "$TIMESTAMP_FILE" ]; then
          LAST_CHECK=$(cat "$TIMESTAMP_FILE")
          echo "📅 Last check: $LAST_CHECK"
          export SINCE_TIMESTAMP="$LAST_CHECK"
        else
          echo "📅 No previous check found, checking last 3 posts"
        fi
        
        # Run spell checker (only checks posts modified since SINCE_TIMESTAMP if set)
        SPELL_EXIT=0
        if [ -n "$SINCE_TIMESTAMP" ]; then
          python3 scripts/ollama_spell_checker.py || SPELL_EXIT=$?
        else
          python3 scripts/ollama_spell_checker.py 3 || SPELL_EXIT=$?
        fi

        if [ "$SPELL_EXIT" -ne 0 ]; then
          echo "⚠️  Spelling issues detected (non-blocking)"
          SPELL_STATUS="⚠️ Issues detected"
        else
          SPELL_STATUS="✅ No issues found"
        fi

        # Save current timestamp for next run
        date -u +"%Y-%m-%dT%H:%M:%SZ" > "$TIMESTAMP_FILE"
        echo "💾 Saved timestamp for next check"

        # Save spell check summary
        echo "## 📝 Spell Check Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Status:** $SPELL_STATUS" >> $GITHUB_STEP_SUMMARY
        echo "- **Last Check:** $(cat $TIMESTAMP_FILE)" >> $GITHUB_STEP_SUMMARY

  build-and-deploy:
    runs-on: self-hosted  # Changed to self-hosted for Cloudflare Access
    timeout-minutes: 60  # Prevent workflow from running indefinitely
    
    steps:
    - name: Validate required environment variables
      run: |
        echo "🔍 Validating required environment variables..."
        MISSING_VARS=()
        MISSING_OPTIONAL=()
        
        # Check for required secrets
        if [ -z "${{ secrets.WP_AUTH_TOKEN }}" ]; then
          MISSING_VARS+=("WP_AUTH_TOKEN")
        fi
        
        # Check for optional secrets (warn but don't fail)
        if [ -z "${{ secrets.SLACK_WEBHOOK_URL }}" ]; then
          MISSING_OPTIONAL+=("SLACK_WEBHOOK_URL")
        fi
        
        if [ -z "${{ secrets.PLAUSIBLE_SHARE_LINK }}" ]; then
          MISSING_OPTIONAL+=("PLAUSIBLE_SHARE_LINK")
        fi
        
        # Report required variables
        if [ ${#MISSING_VARS[@]} -gt 0 ]; then
          echo "❌ Missing required environment variables:"
          for var in "${MISSING_VARS[@]}"; do
            echo "  - $var"
          done
          echo ""
          echo "📝 Please configure these secrets in repository settings:"
          echo "   Settings > Secrets and variables > Actions"
          exit 1
        else
          echo "✅ All required environment variables are set"
          echo "  ✓ WP_AUTH_TOKEN"
        fi
        
        # Report optional variables
        if [ ${#MISSING_OPTIONAL[@]} -gt 0 ]; then
          echo ""
          echo "⚠️  Optional environment variables not set (non-blocking):"
          for var in "${MISSING_OPTIONAL[@]}"; do
            echo "  - $var"
          done
        fi
    
    - name: Checkout repository
      uses: actions/checkout@v5
      with:
        fetch-depth: 0  # Fetch full history for accurate git stats in changelog
      
    - name: Restore build cache
      id: cache-restore
      uses: actions/cache@v5
      with:
        path: |
          .image_optimization_cache
          .last_spell_check_timestamp
        key: build-cache-avif-v3-${{ hashFiles('.image_optimization_cache/**') }}
        restore-keys: |
          build-cache-avif-v3-

    - name: Restore incremental build cache
      id: incremental-cache-restore
      uses: actions/cache/restore@v5
      with:
        path: .build-cache.json
        key: incremental-build-cache-${{ github.run_id }}
        restore-keys: |
          incremental-build-cache-

    - name: Check cache status
      run: |
        echo "🔍 Checking cache restoration status..."
        echo "Image cache hit: ${{ steps.cache-restore.outputs.cache-hit }}"
        echo "Image cache matched key: ${{ steps.cache-restore.outputs.cache-matched-key }}"

        if [ -f ".image_optimization_cache/optimization_cache.json" ]; then
          ENTRIES=$(python3 -c "import json; print(len(json.load(open('.image_optimization_cache/optimization_cache.json'))))" 2>/dev/null || echo "0")
          echo "✓ Image cache: $ENTRIES entries"
        else
          echo "⚠️  Image cache not found (will be created on first run)"
        fi

        echo ""
        echo "Incremental build cache hit: ${{ steps.incremental-cache-restore.outputs.cache-hit }}"
        echo "Incremental cache matched key: ${{ steps.incremental-cache-restore.outputs.cache-matched-key }}"
        if [ -f ".build-cache.json" ]; then
          LAST_BUILD=$(python3 -c "import json; d=json.load(open('.build-cache.json')); print(d.get('last_build_time','unknown'))" 2>/dev/null || echo "unknown")
          POSTS=$(python3 -c "import json; d=json.load(open('.build-cache.json')); print(len(d.get('posts',{})))" 2>/dev/null || echo "0")
          echo "✓ Incremental build cache: $POSTS cached posts, last build: $LAST_BUILD"
          echo "⚡ This run will use incremental WordPress generation"
        else
          echo "⚠️  Incremental build cache not found — first run will be a full build"
        fi
      
    - name: Install system dependencies
      run: |
        echo "📦 Checking system dependencies..."

        # Check for each required binary up front; only touch apt if something
        # is actually missing. On a long-lived self-hosted runner everything is
        # already installed, and hitting apt just to re-confirm costs a dpkg
        # lock wait (up to 120s) behind unattended-upgrades.
        MISSING_PKGS=()
        command -v jq       >/dev/null 2>&1 || MISSING_PKGS+=(jq)
        command -v bc       >/dev/null 2>&1 || MISSING_PKGS+=(bc)
        command -v avifenc  >/dev/null 2>&1 || MISSING_PKGS+=(libavif-bin)
        command -v optipng  >/dev/null 2>&1 || MISSING_PKGS+=(optipng)
        command -v jpegoptim >/dev/null 2>&1 || MISSING_PKGS+=(jpegoptim)
        command -v cwebp    >/dev/null 2>&1 || MISSING_PKGS+=(webp)
        python3 -m pip --version >/dev/null 2>&1 || MISSING_PKGS+=(python3-pip)
        python3 -c 'import venv' >/dev/null 2>&1 || MISSING_PKGS+=(python3-venv)

        if [ ${#MISSING_PKGS[@]} -eq 0 ]; then
          echo "✅ All system dependencies already installed — skipping apt"
        else
          echo "⚠️  Missing packages: ${MISSING_PKGS[*]}"
          echo "⏳ Waiting for dpkg lock..."
          sudo apt-get -o DPkg::Lock::Timeout=120 update -qq
          sudo apt-get -o DPkg::Lock::Timeout=120 install -y "${MISSING_PKGS[@]}"
          echo "✅ System dependencies installed"
        fi
        echo "  ✓ pip: $(python3 -m pip --version)"
        echo "  ✓ jq: $(jq --version)"
        echo "  ✓ bc: $(bc --version | head -n 1)"

        echo ""
        echo "📊 Image optimization tools installed:"
        command -v optipng &> /dev/null && echo "  ✅ optipng: $(optipng --version 2>&1 | head -n 1)" || echo "  ⚠️  optipng not found"
        command -v jpegoptim &> /dev/null && echo "  ✅ jpegoptim: $(jpegoptim --version 2>&1 | head -n 1)" || echo "  ⚠️  jpegoptim not found"
        command -v cwebp &> /dev/null && echo "  ✅ cwebp: $(cwebp -version 2>&1 | head -n 1)" || echo "  ⚠️  cwebp not found"
        command -v avifenc &> /dev/null && echo "  ✅ avifenc: $(avifenc --version 2>&1 | head -n 1)" || echo "  ❌ avifenc not found"

        # Verify avifenc works by checking help
        if command -v avifenc &> /dev/null; then
          echo ""
          echo "🧪 Testing avifenc..."
          avifenc --help &> /dev/null && echo "  ✅ avifenc is functional" || echo "  ⚠️  avifenc may have issues"
        fi

    - name: Verify Python installation
      run: |
        echo "🐍 Verifying Python installation..."
        python3 --version
        which python3
        echo "✅ Python is available"
        
    - name: Install dependencies
      run: |
        echo "🔧 Installing Python dependencies..."
        python3 -m pip install --upgrade pip --break-system-packages
        python3 -m pip install -r requirements.txt --break-system-packages
        python3 -m pip install Pillow pillow-avif-plugin --break-system-packages
        echo "✅ Dependencies installed"
        echo "📋 Installed packages:"
        python3 -m pip list | grep -E "(requests|beautifulsoup4|Pillow)"
        
    - name: Test runner environment
      if: github.event_name == 'workflow_dispatch'  # Only on manual runs
      run: |
        echo "🔍 Current working directory: $(pwd)"
        echo "📋 Files in current directory:"
        ls -la
        echo "📄 Looking for key files:"
        ls -la scripts/wp_to_static_generator.py || echo "❌ File not found"
        echo "🐍 Python version and path:"
        python3 --version
        which python3
        echo "📦 Checking Python dependencies:"
        python3 -c "import requests; print(f'✅ requests {requests.__version__}')" || echo "❌ requests not found"
        python3 -c "import bs4; print(f'✅ beautifulsoup4 {bs4.__version__}')" || echo "❌ beautifulsoup4 not found"

    - name: Validate CSP configuration (Utterances, Plausible, Credly)
      run: |
        echo "🔒 Validating CSP allows all third-party services..."
        echo "   (runs early — only reads _worker.template.js, no WP access needed)"
        python3 scripts/test_csp.py || {
          echo ""
          echo "❌ CSP validation failed!"
          echo "   Check _worker.template.js Content-Security-Policy header"
          echo ""
          exit 1
        }

    - name: Validate WordPress Source Health
      env:
        WP_AUTH_TOKEN: ${{ secrets.WP_AUTH_TOKEN }}
      run: |
        echo "🔍 Validating WordPress source before generation..."
        echo ""

        # Run WordPress source validator
        python3 scripts/validate_wordpress_source.py

        # Check exit code
        if [ $? -ne 0 ]; then
          echo ""
          echo "❌ WordPress source validation failed"
          echo "📋 See wordpress-source-validation.json for details"
          echo ""
          echo "Fix the issues in WordPress before deploying:"
          echo "  - Check broken media references"
          echo "  - Fix missing categories/tags"
          echo "  - Verify SEO metadata (titles, descriptions)"
          exit 1
        fi

        echo ""
        echo "✅ WordPress source is healthy - proceeding with generation"

    - name: Upload WordPress validation report
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: wordpress-validation-report
        path: wordpress-source-validation.json

    - name: Generate static site
      timeout-minutes: 30  # Timeout for site generation
      env:
        WP_AUTH_TOKEN: ${{ secrets.WP_AUTH_TOKEN }}
      run: |
        # Ensure we're in the right directory
        echo "📁 Working from: $(pwd)"
        if [ ! -f "scripts/wp_to_static_generator.py" ]; then
          echo "❌ scripts/wp_to_static_generator.py not found!"
          ls -la scripts/
          exit 1
        fi
        
        # Incremental build: if a previous build cache exists, seed ./static-output/
        # from public/ so unchanged posts stay in place, then let the generator
        # fetch only posts modified since the last run (WP REST API modified_after).
        # On first run (no cache) the generator detects an empty cache and fetches
        # all posts automatically — no --no-incremental flag needed.
        if [ -f ".build-cache.json" ] && [ -d "public" ]; then
          echo "⚡ Incremental build cache found — seeding static-output from previous build..."
          mkdir -p ./static-output
          # Copy all files except Brotli/Gzip variants (regenerated after post-processing)
          rsync -a --exclude='*.br' --exclude='*.gz' public/ ./static-output/
          SEEDED_FILES=$(find ./static-output -type f | wc -l | xargs)
          LAST_BUILD=$(python3 -c "import json; d=json.load(open('.build-cache.json')); print(d.get('last_build_time','unknown'))" 2>/dev/null || echo "unknown")
          echo "✅ Seeded $SEEDED_FILES files — last build: $LAST_BUILD"
          echo ""
          # Restore absolute URLs in seeded HTML so the HTML validator sees the same
          # URL format as a full build (convert_to_staging.py runs AFTER validation,
          # converting absolute → relative; seeded files already have relative URLs).
          # Without this, old posts linking to deleted tags (e.g. /tag/storage/) would
          # fail link validation when seeded — but pass in a full build (absolute URLs
          # are treated as external and skipped by the validator).
          python3 scripts/restore_seeded_urls.py ./static-output
          echo "🔄 Running incremental generation (only WordPress posts modified since $LAST_BUILD will be re-fetched)..."
        else
          echo "🔨 No incremental cache — first run will fetch all posts and create the cache..."
        fi
        # Always run in incremental mode: the generator handles first-run (empty cache)
        # by fetching all posts and saving .build-cache.json for future incremental runs.
        python3 scripts/wp_to_static_generator.py ./static-output

        # Count generated files for summary
        HTML_COUNT=$(find ./static-output -name "*.html" -type f 2>/dev/null | wc -l | xargs)
        TOTAL_SIZE=$(du -sh ./static-output 2>/dev/null | cut -f1)
        echo "📊 Generated $HTML_COUNT HTML files, total size: $TOTAL_SIZE"

        # Guard: fail fast rather than running all optimisation steps on empty output
        if [ "${HTML_COUNT:-0}" -eq 0 ]; then
          echo "❌ ERROR: No HTML files generated — WordPress may be unreachable or returned empty"
          exit 1
        fi

        # Save to environment file for use in later steps
        echo "HTML_COUNT=$HTML_COUNT" >> $GITHUB_ENV
        echo "TOTAL_SIZE=$TOTAL_SIZE" >> $GITHUB_ENV
        
        # Reuse already-optimized AVIF/WebP from the previous build in public/
        # rsync --ignore-existing skips files that already exist in static-output
        # so freshly generated conversions are never overwritten.
        if [ -d "public/wp-content/uploads" ] && [ -d "./static-output/wp-content/uploads" ]; then
          echo "📋 Copying already-optimized modern formats via rsync..."
          AVIF_BEFORE=$(find ./static-output/wp-content/uploads -type f -name "*.avif" | wc -l | xargs)
          WEBP_BEFORE=$(find ./static-output/wp-content/uploads -type f -name "*.webp" | wc -l | xargs)

          rsync -a --ignore-existing \
            --include='*/' --include='*.avif' --include='*.webp' \
            --exclude='*' \
            public/wp-content/uploads/ ./static-output/wp-content/uploads/

          AVIF_AFTER=$(find ./static-output/wp-content/uploads -type f -name "*.avif" | wc -l | xargs)
          WEBP_AFTER=$(find ./static-output/wp-content/uploads -type f -name "*.webp" | wc -l | xargs)
          echo "✅ Copied $((AVIF_AFTER - AVIF_BEFORE)) AVIF and $((WEBP_AFTER - WEBP_BEFORE)) WebP files from previous build"

          # Replace originals with previously-optimized versions if they are smaller
          REPLACED=0
          find ./static-output/wp-content/uploads -type f \( -name "*.png" -o -name "*.jpg" -o -name "*.jpeg" \) | while read new_img; do
            rel_path="${new_img#./static-output/}"
            old_img="public/$rel_path"
            if [ -f "$old_img" ]; then
              new_size=$(stat -f%z "$new_img" 2>/dev/null || stat -c%s "$new_img" 2>/dev/null)
              old_size=$(stat -f%z "$old_img" 2>/dev/null || stat -c%s "$old_img" 2>/dev/null)
              if [ "$old_size" -lt "$new_size" ]; then
                cp "$old_img" "$new_img"
                REPLACED=$((REPLACED + 1))
              fi
            fi
          done
          echo "✅ Reused $REPLACED optimized original images from previous build"

          # Count how many images still need modern formats
          TOTAL_IMAGES=$(find ./static-output/wp-content/uploads -type f \( -name "*.png" -o -name "*.jpg" -o -name "*.jpeg" \) | wc -l | xargs)
          EXISTING_AVIF=$(find ./static-output/wp-content/uploads -type f -name "*.avif" | wc -l | xargs)
          NEED_CONVERSION=$((TOTAL_IMAGES - EXISTING_AVIF))
          echo "📊 Images needing AVIF/WebP conversion: $NEED_CONVERSION of $TOTAL_IMAGES"
        fi
        
        # Add generation summary to GitHub Actions UI
        echo "## 📊 Site Generation Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **HTML Pages:** $HTML_COUNT" >> $GITHUB_STEP_SUMMARY
        echo "- **Total Size:** $TOTAL_SIZE" >> $GITHUB_STEP_SUMMARY
        echo "- **Output Directory:** `./static-output`" >> $GITHUB_STEP_SUMMARY

    - name: Save incremental build cache
      if: success()
      uses: actions/cache/save@v5
      with:
        path: .build-cache.json
        key: incremental-build-cache-${{ github.run_id }}

    - name: Export to Markdown
      run: |
        echo "📝 Exporting content to markdown..."
        python3 scripts/markdown_exporter.py \
          ./static-output \
          ./static-output/markdown \
          https://jameskilby.co.uk
        
    - name: Generate Markdown API
      run: |
        echo "🔌 Generating markdown API..."
        python3 scripts/markdown_api.py \
          ./static-output/markdown \
          ./static-output/api

    - name: Content quality validation
      timeout-minutes: 5
      continue-on-error: true  # Non-blocking: warnings won't fail the build
      run: |
        echo "📋 Running content quality checks..."

        # Run content validator against the freshly-built output (not the committed public/)
        python3 scripts/content_validator.py static-output || {
          echo "⚠️  Content validation found issues (non-blocking)"
        }
        
        # Parse validation report and add to summary
        if [ -f "validation-report.json" ]; then
          ERROR_COUNT=$(jq '.summary.errors' validation-report.json)
          WARNING_COUNT=$(jq '.summary.warnings' validation-report.json)
          STATUS=$(jq -r '.summary.status' validation-report.json)
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📋 Content Quality Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** $([ "$STATUS" = "PASS" ] && echo "✅ Pass" || echo "⚠️ Issues Found")" >> $GITHUB_STEP_SUMMARY
          echo "- **Errors:** $ERROR_COUNT" >> $GITHUB_STEP_SUMMARY
          echo "- **Warnings:** $WARNING_COUNT" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Show top issues if any
          if [ "$ERROR_COUNT" -gt 0 ]; then
            echo "### ❌ Top Errors" >> $GITHUB_STEP_SUMMARY
            jq -r '.errors[:3] | .[] | "- " + .message' validation-report.json >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "$WARNING_COUNT" -gt 0 ]; then
            echo "### ⚠️ Top Warnings" >> $GITHUB_STEP_SUMMARY
            jq -r '.warnings[:3] | .[] | "- " + .message' validation-report.json >> $GITHUB_STEP_SUMMARY
          fi
        else
          echo "⚠️  No validation report generated" >> $GITHUB_STEP_SUMMARY
        fi

    - name: Upload content validation report
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: content-validation-report
        path: validation-report.json

    - name: Optimize images
      timeout-minutes: 40  # Timeout for image optimization
      shell: bash
      run: |
        echo "🖼️  Starting advanced image optimization with AVIF..."
        
        # Run the Python-based optimizer with parallel processing
        # Uses 4 parallel workers, creates AVIF versions by default
        # Cache is stored in .image_optimization_cache/ for persistence
        python3 scripts/optimize_images.py ./static-output \
          --workers 4 \
          --json-output optimization-results.json \
          --cache-dir .image_optimization_cache || {
          echo "⚠️  Image optimization failed (non-blocking)"
          # Set defaults if optimization fails
          echo "PNG_COUNT=0" >> $GITHUB_ENV
          echo "JPG_COUNT=0" >> $GITHUB_ENV
          echo "OPTIMIZED_COUNT=0" >> $GITHUB_ENV
          echo "SKIPPED_COUNT=0" >> $GITHUB_ENV
          echo "SAVED_MB=0.0" >> $GITHUB_ENV
          exit 0
        }
        
        # Parse JSON results and extract metrics
        if [ -f "optimization-results.json" ]; then
          # Count by format type
          PNG_COUNT=$(jq '[.[] | select(.format_type == "PNG")] | length' optimization-results.json)
          JPG_COUNT=$(jq '[.[] | select(.format_type == "JPEG")] | length' optimization-results.json)
          
          # Count optimized vs cached
          OPTIMIZED_COUNT=$(jq '[.[] | select(.was_cached == false)] | length' optimization-results.json)
          SKIPPED_COUNT=$(jq '[.[] | select(.was_cached == true)] | length' optimization-results.json)
          
          # Calculate total savings in MB
          SAVED_BYTES=$(jq '[.[] | .saved_bytes] | add // 0' optimization-results.json)
          SAVED_MB=$(echo "scale=2; $SAVED_BYTES / 1024 / 1024" | bc)
          
          # Calculate average optimization time for newly optimized images
          # Handle case where all images are cached (length = 0)
          AVG_TIME=$(jq '[.[] | select(.was_cached == false) | .duration_ms] | if length > 0 then (add / length | floor) else 0 end' optimization-results.json)
          
          # Count AVIF and WebP versions created
          AVIF_COUNT=$(jq '[.[] | select(.avif_created == true)] | length' optimization-results.json)
          WEBP_COUNT=$(jq '[.[] | select(.webp_created == true)] | length' optimization-results.json)
          
          echo "📊 Optimization Results:"
          echo "   • PNG Images: $PNG_COUNT"
          echo "   • JPEG Images: $JPG_COUNT"
          echo "   • Newly Optimized: $OPTIMIZED_COUNT"
          echo "   • Cached (Skipped): $SKIPPED_COUNT"
          echo "   • AVIF Created: $AVIF_COUNT"
          echo "   • WebP Created: $WEBP_COUNT"
          echo "   • Space Saved: ${SAVED_MB}MB"
          echo "   • Avg Time/Image: ${AVG_TIME}ms"
          
          # Save to environment for later steps
          echo "PNG_COUNT=$PNG_COUNT" >> $GITHUB_ENV
          echo "JPG_COUNT=$JPG_COUNT" >> $GITHUB_ENV
          echo "OPTIMIZED_COUNT=$OPTIMIZED_COUNT" >> $GITHUB_ENV
          echo "SKIPPED_COUNT=$SKIPPED_COUNT" >> $GITHUB_ENV
          echo "AVIF_COUNT=$AVIF_COUNT" >> $GITHUB_ENV
          echo "WEBP_COUNT=$WEBP_COUNT" >> $GITHUB_ENV
          echo "SAVED_MB=$SAVED_MB" >> $GITHUB_ENV
          echo "AVG_TIME=$AVG_TIME" >> $GITHUB_ENV
          
          # Add to GitHub Actions summary
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 🖼️ Image Optimization Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Total Images:** $((PNG_COUNT + JPG_COUNT))" >> $GITHUB_STEP_SUMMARY
          echo "  - PNG: $PNG_COUNT" >> $GITHUB_STEP_SUMMARY
          echo "  - JPEG: $JPG_COUNT" >> $GITHUB_STEP_SUMMARY
          echo "- **Newly Optimized:** $OPTIMIZED_COUNT" >> $GITHUB_STEP_SUMMARY
          echo "- **Already Optimized (Skipped):** $SKIPPED_COUNT" >> $GITHUB_STEP_SUMMARY
          echo "- **Modern Formats:**" >> $GITHUB_STEP_SUMMARY
          echo "  - AVIF: $AVIF_COUNT" >> $GITHUB_STEP_SUMMARY
          echo "  - WebP: $WEBP_COUNT" >> $GITHUB_STEP_SUMMARY
          echo "- **Space Saved:** ${SAVED_MB} MB" >> $GITHUB_STEP_SUMMARY
          echo "- **Avg Time per Image:** ${AVG_TIME} ms" >> $GITHUB_STEP_SUMMARY
          echo "- **Parallel Workers:** 4" >> $GITHUB_STEP_SUMMARY
        else
          echo "⚠️  No optimization results found"
          echo "PNG_COUNT=0" >> $GITHUB_ENV
          echo "JPG_COUNT=0" >> $GITHUB_ENV
          echo "OPTIMIZED_COUNT=0" >> $GITHUB_ENV
          echo "SKIPPED_COUNT=0" >> $GITHUB_ENV
          echo "SAVED_MB=0.0" >> $GITHUB_ENV
        fi

        # Verify cache file was created and populated
        echo ""
        echo "💾 Cache file will be automatically saved by GitHub Actions"
        if [ -f ".image_optimization_cache/optimization_cache.json" ]; then
          CACHE_ENTRIES=$(python3 -c "import json; print(len(json.load(open('.image_optimization_cache/optimization_cache.json'))))" 2>/dev/null || echo "0")
          echo "  ✅ Cache file exists with $CACHE_ENTRIES entries"
        else
          echo "  ⚠️  Cache file not found (may be created on first optimization)"
        fi

    - name: Optimize CSS files (unused removal + minify)
      run: |
        echo "🎨 Optimizing CSS files..."

        # Remove unused CSS selectors (must complete before HTML transformer
        # extracts critical CSS from the pruned stylesheets)
        echo "  1/2 Removing unused CSS selectors..."
        python3 scripts/optimize_css.py ./static-output || echo "⚠️  CSS optimization failed (non-blocking)"

        # Minify CSS files
        echo "  2/2 Minifying CSS files..."
        python3 scripts/optimize_css.py ./static-output --minify-only || echo "⚠️  CSS minification failed (non-blocking)"
      continue-on-error: true

    - name: Single-pass HTML transformer (SEO + pictures + perf + critical CSS + minify)
      timeout-minutes: 15
      run: |
        echo "🔄 Running single-pass HTML transformer..."
        echo "   Applies in one parse cycle per file:"
        echo "     1. SEO fixes (title, meta, canonical, JSON-LD)"
        echo "     2. Image → picture conversion (AVIF/WebP sources)"
        echo "     3. Performance hints (async/defer, lazy loading, preconnect)"
        echo "     4. Critical CSS extraction and inlining"
        echo "     5. Head link deduplication"
        echo "     6. HTML minification"
        echo ""

        python3 scripts/html_transformer.py ./static-output || {
          echo "⚠️  HTML transformer failed (non-blocking)"
          exit 0
        }
      continue-on-error: true

    - name: Generate soft-404 artefacts and stamp Advanced Mode Worker
      run: |
        # Must run BEFORE Brotli compression so _worker.js and
        # path-manifest.json get compressed + validated in lockstep with
        # their .br/.gz sidecars. Running this AFTER the mv to public/
        # lets stale committed .br files get reused, producing a mismatch
        # at the validation step.
        echo "🛡️  Generating soft-404 artefacts into static-output..."
        python3 scripts/generate_soft404_artefacts.py ./static-output

        if [ -f "_worker.template.js" ]; then
          python3 scripts/stamp_worker_manifest.py ./static-output
          echo "✅ _worker.js stamped with path manifest"
        else
          echo "⚠️  WARNING: _worker.template.js not found — Advanced Mode will not be enabled"
        fi

    - name: Brotli + Gzip compress static files
      timeout-minutes: 10
      run: |
        echo "🗜️  Compressing final optimized files with Brotli (primary) + Gzip (fallback)..."

        # Reuse existing .br/.gz files from previous build where the source
        # file content is unchanged. Only copy when the source file in
        # static-output matches the one in public/ (by size) — pipeline steps
        # (minify, SEO, etc.) may have rewritten files, so stale compressed
        # data must not be carried forward.
        if [ -d "public" ]; then
          REUSED=0
          STALE=0
          while IFS= read -r br_file; do
            rel="${br_file#public/}"
            target="./static-output/$rel"

            # Skip directories whose content is regenerated by post-deploy
            # scripts (generate_changelog.py, generate_stats_page.py). Their
            # .br/.gz sidecars in public/ are always stale because the scripts
            # update the source files AFTER the main Brotli pass.
            case "$rel" in changelog/*|stats/*) STALE=$((STALE + 1)); continue;; esac

            # Derive the uncompressed original path
            original="${target%.br}"
            original="${original%.gz}"
            old_original="public/${rel%.br}"
            old_original="${old_original%.gz}"
            if [ -f "$original" ] && [ -f "$old_original" ]; then
              # Byte-for-byte comparison — catches same-size files with
              # different content (e.g. JSON with updated timestamps)
              if cmp -s "$original" "$old_original"; then
                cp -p "$br_file" "$target" 2>/dev/null && REUSED=$((REUSED + 1))
              else
                STALE=$((STALE + 1))
              fi
            fi
          done < <(find public \( -name "*.br" -o -name "*.gz" \) -type f 2>/dev/null)
          echo "   ♻️  Reused $REUSED compressed files from previous build (skipped $STALE stale)"
        fi

        # Run compression — produces .br and .gz alongside each original
        # Files with existing newer .br/.gz will be skipped automatically
        python3 scripts/brotli_compress.py ./static-output || {
          echo "⚠️  Compression failed (non-blocking)"
          echo "BROTLI_COUNT=0" >> $GITHUB_ENV
          echo "GZIP_COUNT=0" >> $GITHUB_ENV
          echo "BROTLI_SAVED_MB=0.0" >> $GITHUB_ENV
          exit 0
        }

        # Count compressed files
        BROTLI_COUNT=$(find ./static-output -name "*.br" -type f | wc -l | xargs)
        GZIP_COUNT=$(find ./static-output -name "*.gz" -type f | wc -l | xargs)

        # Calculate total size of .br and .gz files
        BROTLI_SIZE=$(find ./static-output -name "*.br" -type f -exec ls -l {} \; | awk '{sum+=$5} END {print sum}')
        BROTLI_SIZE_MB=$(echo "scale=2; $BROTLI_SIZE / 1024 / 1024" | bc)
        GZIP_SIZE=$(find ./static-output -name "*.gz" -type f -exec ls -l {} \; | awk '{sum+=$5} END {print sum}')
        GZIP_SIZE_MB=$(echo "scale=2; $GZIP_SIZE / 1024 / 1024" | bc)

        # Calculate original size for comparison
        ORIGINAL_SIZE=$(find ./static-output -type f \( -name "*.html" -o -name "*.css" -o -name "*.js" -o -name "*.json" -o -name "*.xml" -o -name "*.svg" \) -exec ls -l {} \; | awk '{sum+=$5} END {print sum}')
        ORIGINAL_SIZE_MB=$(echo "scale=2; $ORIGINAL_SIZE / 1024 / 1024" | bc)

        # Calculate savings
        BROTLI_SAVED=$(echo "$ORIGINAL_SIZE - $BROTLI_SIZE" | bc)
        BROTLI_SAVED_MB=$(echo "scale=2; $BROTLI_SAVED / 1024 / 1024" | bc)
        BROTLI_RATIO=$(echo "scale=1; (1 - $BROTLI_SIZE / $ORIGINAL_SIZE) * 100" | bc)

        echo "📊 Compression Results:"
        echo "   • Brotli files: $BROTLI_COUNT (.br)"
        echo "   • Gzip files:   $GZIP_COUNT (.gz)"
        echo "   • Original size: ${ORIGINAL_SIZE_MB}MB"
        echo "   • Brotli size: ${BROTLI_SIZE_MB}MB (${BROTLI_RATIO}% reduction)"
        echo "   • Gzip size:   ${GZIP_SIZE_MB}MB"
        echo "   • Brotli saved: ${BROTLI_SAVED_MB}MB"

        # Save to environment
        echo "BROTLI_COUNT=$BROTLI_COUNT" >> $GITHUB_ENV
        echo "GZIP_COUNT=$GZIP_COUNT" >> $GITHUB_ENV
        echo "BROTLI_SAVED_MB=$BROTLI_SAVED_MB" >> $GITHUB_ENV
        echo "BROTLI_RATIO=$BROTLI_RATIO" >> $GITHUB_ENV

        # Add to GitHub Actions summary
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## 🗜️ Compression Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Format | Files | Size | Notes |" >> $GITHUB_STEP_SUMMARY
        echo "|--------|-------|------|-------|" >> $GITHUB_STEP_SUMMARY
        echo "| Brotli (.br) | $BROTLI_COUNT | ${BROTLI_SIZE_MB} MB | Primary — served to modern browsers |" >> $GITHUB_STEP_SUMMARY
        echo "| Gzip (.gz) | $GZIP_COUNT | ${GZIP_SIZE_MB} MB | Fallback — served to legacy clients |" >> $GITHUB_STEP_SUMMARY
        echo "| Original | — | ${ORIGINAL_SIZE_MB} MB | Served if neither encoding accepted |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Brotli Space Saved:** ${BROTLI_SAVED_MB} MB (${BROTLI_RATIO}% reduction)" >> $GITHUB_STEP_SUMMARY
      continue-on-error: true

    - name: Validate HTML and deployment (parallel)
      timeout-minutes: 10
      run: |
        echo "🔍 Running HTML validation and deployment validation in parallel..."

        # Both validators are read-only — safe to run simultaneously
        python3 scripts/validate_html.py ./static-output &
        PID_HTML=$!
        python3 scripts/validate_deployment.py ./static-output &
        PID_DEPLOY=$!

        HTML_OK=true
        DEPLOY_OK=true

        wait $PID_HTML || HTML_OK=false
        wait $PID_DEPLOY || DEPLOY_OK=false

        if [ "$HTML_OK" = true ]; then
          echo "✅ HTML validation passed!"
        else
          echo "❌ HTML validation failed!"
        fi

        if [ "$DEPLOY_OK" = true ]; then
          echo "✅ Deployment validation passed!"
        else
          echo "❌ Deployment validation failed!"
        fi

        # Add to GitHub Actions summary
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## ✅ Validation" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **HTML Validation:** $([ "$HTML_OK" = true ] && echo '✅ Passed' || echo '❌ Failed')" >> $GITHUB_STEP_SUMMARY
        echo "- **Deployment Validation:** $([ "$DEPLOY_OK" = true ] && echo '✅ Passed' || echo '❌ Failed')" >> $GITHUB_STEP_SUMMARY

        # Fail step if either validation failed
        if [ "$HTML_OK" = false ] || [ "$DEPLOY_OK" = false ]; then
          exit 1
        fi

    - name: Prepare output for deployment
      run: |
        # Configure git
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"

        # Preserve the populated cache before reset
        echo "💾 Preserving optimization cache before reset..."
        if [ -f ".image_optimization_cache/optimization_cache.json" ]; then
          CACHE_ENTRIES=$(python3 -c "import json; print(len(json.load(open('.image_optimization_cache/optimization_cache.json'))))" 2>/dev/null || echo "0")
          echo "  Cache has $CACHE_ENTRIES entries before reset"
          cp -r .image_optimization_cache /tmp/preserved_cache_$$
          echo "  ✓ Cache backed up to /tmp/preserved_cache_$$"
        fi

        # Ensure we're on the latest version of main
        echo "🔄 Syncing with remote repository..."
        git fetch origin
        git reset --hard origin/main

        # Restore the cache after reset
        if [ -d "/tmp/preserved_cache_$$" ]; then
          cp -r /tmp/preserved_cache_$$/optimization_cache.json .image_optimization_cache/
          echo "  ✓ Cache restored"
          rm -rf /tmp/preserved_cache_$$
        fi

        # Move static output to public/
        rm -rf public/
        mv ./static-output public/

        # Copy IndexNow key file
        if [ -f ".indexnow_key" ]; then
          INDEXNOW_KEY=$(cat .indexnow_key)
          cp .indexnow_key "public/${INDEXNOW_KEY}.txt"
          echo "✅ IndexNow key file copied to public/${INDEXNOW_KEY}.txt"
        fi

        # soft-404 artefacts and the stamped _worker.js are generated in the
        # "Generate soft-404 artefacts and stamp Advanced Mode Worker" step
        # above (before Brotli compression + validation), so they already live
        # inside public/ at this point alongside their .br/.gz sidecars.

        # Generate security.txt (RFC 9116) with a rolling 1-year expiry
        mkdir -p public/.well-known
        SECURITY_TXT_EXPIRES=$(date -u -d '+365 days' '+%Y-%m-%dT%H:%M:%SZ' 2>/dev/null || date -u -v+365d '+%Y-%m-%dT%H:%M:%SZ')
        cat > public/.well-known/security.txt <<EOF
        Contact: mailto:security@jameskilby.cloud
        Expires: ${SECURITY_TXT_EXPIRES}
        Preferred-Languages: en
        Canonical: https://jameskilby.co.uk/.well-known/security.txt
        EOF
        cp public/.well-known/security.txt public/security.txt
        echo "✅ security.txt written (expires ${SECURITY_TXT_EXPIRES})"

        # Convert absolute URLs to relative for staging compatibility
        # (preserves absolute URLs in canonical, OG/Twitter meta, and JSON-LD)
        echo "🔄 Converting URLs for staging compatibility..."
        python3 scripts/convert_to_staging.py

    - name: Generate changelog, stats, and recompress
      run: |
        echo "📋 Generating changelog page..."
        python3 scripts/generate_changelog.py || echo "⚠️  Changelog generation failed (non-blocking)"

        echo "📊 Generating stats page..."
        PLAUSIBLE_SHARE_LINK="${{ secrets.PLAUSIBLE_SHARE_LINK }}" python3 scripts/generate_stats_page.py || echo "⚠️  Stats page generation failed (non-blocking)"

        # Recompress files created after the main Brotli pass
        echo "🗜️  Recompressing post-deploy generated files..."
        for dir in public/changelog public/stats; do
          [ -d "$dir" ] && python3 scripts/brotli_compress.py "$dir" 2>/dev/null || true
        done
      continue-on-error: true

    - name: Commit and push static site
      timeout-minutes: 5
      run: |
        git add public/ .last_spell_check_timestamp .image_optimization_cache/ .indexnow_key 2>/dev/null || true

        # Add the IndexNow key verification file by its exact name
        if [ -f ".indexnow_key" ]; then
          INDEXNOW_KEY_NAME=$(cat .indexnow_key)
          git add "${INDEXNOW_KEY_NAME}.txt" 2>/dev/null || true
        fi

        if [ -z "$(git diff --cached)" ]; then
          echo "ℹ️  No changes to commit"
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## ℹ️ Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** No changes detected" >> $GITHUB_STEP_SUMMARY
          echo "- **Note:** Site is already up to date" >> $GITHUB_STEP_SUMMARY
          exit 0
        fi

        echo "📝 Changes detected, committing..."
        git commit -m "🚀 Auto-update static site - $(date '+%Y-%m-%d %H:%M:%S')"

        echo "📤 Pushing to remote..."
        if git push origin main; then
          echo "✅ Push successful"
        else
          echo "⚠️  Push failed, trying rebase and retry..."
          git fetch origin
          if git rebase origin/main; then
            git push origin main
          else
            git rebase --abort 2>/dev/null || true
            echo "❌ Push failed after rebase attempt — failing build for manual review"
            exit 1
          fi
        fi

        echo "✅ Static site updated successfully"
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Status:** ✅ Successfully deployed" >> $GITHUB_STEP_SUMMARY
        echo "- **Commit:** $(git rev-parse --short HEAD)" >> $GITHUB_STEP_SUMMARY
        echo "- **Cloudflare Pages:** Will auto-deploy from repository" >> $GITHUB_STEP_SUMMARY
    - name: Notify on success
      if: success()
      run: |
        echo "✅ Static site generated and committed successfully!"
        echo "🌐 Cloudflare Pages will auto-deploy from the 'public' directory"
        echo "📁 Generated files are now in the 'public' directory for Pages deployment"

    - name: Setup Node.js (for Wrangler)
      if: success()
      uses: actions/setup-node@v6
      with:
        node-version: '20'

    - name: Upload search index to Workers KV
      if: success()
      run: |
        echo "🔍 Uploading search index to Workers KV..."
        
        # Check if search index exists
        if [ ! -f "public/search-index.json" ]; then
          echo "⚠️  Search index not found, skipping KV upload"
          exit 0
        fi
        
        # Install Wrangler if not already available
        if ! command -v wrangler &> /dev/null; then
          echo "Installing Wrangler..."
          npm install -g wrangler
        fi
        
        # Upload to KV (requires CLOUDFLARE_API_TOKEN and KV_SEARCH_INDEX_ID secrets)
        if [ -n "${{ secrets.CLOUDFLARE_API_TOKEN }}" ] && [ -n "${{ secrets.KV_SEARCH_INDEX_ID }}" ]; then
          CURRENT_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          
          if npx wrangler kv key put \
            --namespace-id="${{ secrets.KV_SEARCH_INDEX_ID }}" \
            "current" public/search-index.json \
            --metadata="{\"updated\":\"${CURRENT_TIME}\"}"; then
            echo "✅ Search index uploaded to Workers KV"
            echo "   Updated: ${CURRENT_TIME}"

            # Add to summary
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "## 🔍 Search Index Updated" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "- **KV Namespace:** SEARCH_INDEX" >> $GITHUB_STEP_SUMMARY
            echo "- **Updated:** ${CURRENT_TIME}" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️  Failed to upload search index to KV (non-blocking)"
          fi
        else
          echo "ℹ️  Skipping KV upload (CLOUDFLARE_API_TOKEN or KV_SEARCH_INDEX_ID not set)"
          echo "   To enable: Add secrets to repository settings"
        fi
      continue-on-error: true
      env:
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    
    - name: Purge soft-404 poisoned KV entries
      if: success()
      env:
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      run: |
        echo "🛡️  Evicting poisoned soft-404 entries from HTML_CACHE..."

        if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
          echo "ℹ️  CLOUDFLARE_API_TOKEN or CLOUDFLARE_ACCOUNT_ID not set — skipping"
          echo "   Add them to repository secrets to auto-clean ghost URLs after deploy"
          exit 0
        fi

        if [ ! -f public/path-manifest.json ]; then
          echo "⚠️  public/path-manifest.json missing — soft-404 guard was not stamped this run"
          exit 0
        fi

        # Script exits 0 on success; captures the ghost count from stderr/stdout.
        python3 scripts/purge_soft404_kv_cache.py \
          --manifest public/path-manifest.json \
          | tee /tmp/soft404-purge.log

        GHOSTS=$(grep -oE 'Purged [0-9]+ poisoned' /tmp/soft404-purge.log | grep -oE '[0-9]+' | head -1)
        GHOSTS="${GHOSTS:-0}"

        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## 🛡️ Soft-404 KV Purge" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Ghost entries evicted:** $GHOSTS" >> $GITHUB_STEP_SUMMARY
      continue-on-error: true

    - name: Purge all HTML from KV cache
      if: success()
      run: |
        echo "🗑️ Purging all HTML entries from Workers KV cache..."

        if [ -z "${{ secrets.CACHE_PURGE_TOKEN }}" ]; then
          echo "ℹ️  CACHE_PURGE_TOKEN not set, skipping KV cache purge"
          echo "   To enable: Add CACHE_PURGE_TOKEN to repository secrets"
          exit 0
        fi

        RESPONSE=$(curl -s -w "\n%{http_code}" \
          -X POST "https://jameskilby.co.uk/.purge?all=true" \
          -H "X-Purge-Token: ${{ secrets.CACHE_PURGE_TOKEN }}")

        HTTP_CODE=$(echo "$RESPONSE" | tail -1)
        BODY=$(echo "$RESPONSE" | sed '$d')

        if [ "$HTTP_CODE" = "200" ]; then
          PURGED_COUNT=$(echo "$BODY" | jq -r '.count // 0')
          echo "✅ Purged $PURGED_COUNT entries from KV cache"
        else
          echo "⚠️  Purge-all failed (HTTP $HTTP_CODE): $BODY"
        fi

        # Add to summary
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## 🗑️ KV Cache Purged" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Entries Purged:** ${PURGED_COUNT:-unknown}" >> $GITHUB_STEP_SUMMARY
        echo "- **Method:** Purge all" >> $GITHUB_STEP_SUMMARY
      continue-on-error: true

    - name: Purge changed HTML from Cloudflare CDN cache
      if: success()
      env:
        CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      run: |
        echo "🗑️ Purging changed HTML pages from Cloudflare CDN edge cache..."

        if [ -z "$CLOUDFLARE_ZONE_ID" ] || [ -z "$CLOUDFLARE_API_TOKEN" ]; then
          echo "ℹ️  CLOUDFLARE_ZONE_ID or CLOUDFLARE_API_TOKEN not set, skipping CDN purge"
          exit 0
        fi

        # Get list of changed HTML files from this deploy
        if git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD | grep "^public/.*\.html$" || true)
        else
          CHANGED_FILES=""
        fi

        if [ -z "$CHANGED_FILES" ]; then
          echo "ℹ️  No HTML files changed, skipping CDN purge"
          exit 0
        fi

        FILE_COUNT=$(echo "$CHANGED_FILES" | wc -l | tr -d ' ')
        echo "Found $FILE_COUNT changed HTML files"

        # Convert file paths to full URLs
        URLS=()
        while read -r file; do
          URL_PATH=$(echo "$file" | sed 's|^public||' | sed 's|/index\.html$|/|')
          URLS+=("https://jameskilby.co.uk${URL_PATH}")
        done <<< "$CHANGED_FILES"

        # Cloudflare API accepts up to 30 URLs per request — batch accordingly
        BATCH_SIZE=30
        TOTAL=${#URLS[@]}
        PURGED=0

        for ((i=0; i<TOTAL; i+=BATCH_SIZE)); do
          BATCH=("${URLS[@]:i:BATCH_SIZE}")

          # Build JSON array of URLs for this batch
          JSON_URLS=$(printf '%s\n' "${BATCH[@]}" | jq -R . | jq -s .)

          RESPONSE=$(curl -s -X POST \
            "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data "{\"files\": ${JSON_URLS}}")

          if echo "$RESPONSE" | grep -q '"success":true'; then
            BATCH_COUNT=${#BATCH[@]}
            PURGED=$((PURGED + BATCH_COUNT))
            echo "  ✅ Purged batch: $BATCH_COUNT URLs"
          else
            echo "  ❌ Batch purge failed:"
            echo "$RESPONSE" | head -5
          fi
        done

        echo ""
        echo "✅ Purged $PURGED/$TOTAL changed HTML pages from Cloudflare CDN"

        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## 🗑️ Cloudflare CDN Cache Purged" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **HTML Pages Purged:** $PURGED/$TOTAL" >> $GITHUB_STEP_SUMMARY
        echo "- **Method:** Cloudflare API (changed files only)" >> $GITHUB_STEP_SUMMARY
      continue-on-error: true

    - name: Purge static assets from Cloudflare cache
      if: success()
      env:
        CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      run: |
        bash scripts/purge_static_cache.sh
      continue-on-error: true

    - name: Submit URLs to IndexNow
      if: success()
      run: |
        echo "🔔 Submitting URLs to IndexNow..."
        # Runs after the site is live and caches are purged so crawlers see fresh content
        python3 scripts/submit_indexnow.py ./public || echo "⚠️  IndexNow submission failed (non-blocking)"
      continue-on-error: true

    - name: Notify Slack on Success
      if: success()
      uses: slackapi/slack-github-action@v3.0.1
      with:
        webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
        webhook-type: incoming-webhook
        payload: |
          {
            "channel": "#web",
            "username": "GitHub Actions",
            "icon_emoji": ":github:",
            "attachments": [
              {
                "color": "good",
                "title": "✅ jkcoukblog Build Success",
                "text": "jkcoukblog static site built and pushed successfully!",
                "fields": [
                  {
                    "title": "HTML Pages",
                    "value": "${{ env.HTML_COUNT }}",
                    "short": true
                  },
                  {
                    "title": "Site Size",
                    "value": "${{ env.TOTAL_SIZE }}",
                    "short": true
                  },
                  {
                    "title": "Images Optimized",
                    "value": "${{ env.OPTIMIZED_COUNT }} (skipped: ${{ env.SKIPPED_COUNT }})",
                    "short": true
                  },
                  {
                    "title": "Space Saved",
                    "value": "${{ env.SAVED_MB }}MB",
                    "short": true
                  },
                  {
                    "title": "Trigger",
                    "value": "${{ github.event_name == 'workflow_dispatch' && format('Manual by {0}', github.actor) || format('Commit by {0}', github.event.head_commit.author.name || github.actor) }}",
                    "short": true
                  },
                  {
                    "title": "Message",
                    "value": "${{ github.event.head_commit.message || 'Manual workflow dispatch' }}",
                    "short": false
                  }
                ],
                "footer": "🌐 Cloudflare Pages will now deploy the site automatically",
                "footer_icon": "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png",
                "actions": [
                  {
                    "type": "button",
                    "text": "View Workflow",
                    "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                ]
              }
            ]
          }
        
    - name: Clean up on failure
      if: failure()
      run: |
        # Remove the partially-built static-output directory so stale files
        # from a failed run don't bleed into the next build.
        if [ -d "./static-output" ]; then
          rm -rf ./static-output
          echo "🧹 Removed ./static-output after failed build"
        fi

    - name: Notify on failure
      if: failure()
      run: |
        echo "❌ Static site generation or commit failed!"
        
    - name: Notify Slack on Failure  
      if: failure()
      uses: slackapi/slack-github-action@v3.0.1
      with:
        webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
        webhook-type: incoming-webhook
        payload: |
          {
            "channel": "#web",
            "username": "GitHub Actions",
            "icon_emoji": ":github:",
            "attachments": [
              {
                "color": "danger",
                "title": "❌ jkcoukblog Build Failed",
                "text": "jkcoukblog deployment failed!",
                "fields": [
                  {
                    "title": "Trigger",
                    "value": "${{ github.event_name == 'workflow_dispatch' && format('Manual by {0}', github.actor) || format('Commit by {0}', github.event.head_commit.author.name || github.actor) }}",
                    "short": true
                  },
                  {
                    "title": "Branch",
                    "value": "${{ github.ref_name }}",
                    "short": true
                  },
                  {
                    "title": "Message",
                    "value": "${{ github.event.head_commit.message || 'Manual workflow dispatch' }}",
                    "short": false
                  }
                ],
                "footer": "Please check the GitHub Actions logs for details",
                "footer_icon": "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png",
                "actions": [
                  {
                    "type": "button",
                    "text": "View Workflow Logs",
                    "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                ]
              }
            ]
          }
