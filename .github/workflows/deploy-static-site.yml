                    "title": "Trigger",
                    "value": "${{ github.event_name == 'workflow_dispatch' && format('Manual by {0}', github.actor) || format('Commit by {0}', github.event.head_commit.author.name || github.actor) }}",
                    "short": true
                  },
                  {
                    "title": "Message",
                    "value": "${{ github.event.head_commit.message || 'Manual workflow dispatch' }}",
                    "short": false
                  }
                ],
                "footer": "🌐 Cloudflare Pages will now deploy the site automatically",
                "footer_icon": "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png",
                "actions": [
                  {
                    "type": "button",
                    "text": "View Workflow",
                    "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                ]
              }
            ]
          }
        
    - name: Notify on failure
      if: failure()
      run: |
        echo "❌ Static site generation or commit failed!"
        
    - name: Notify Slack on Failure  
      if: failure()
      uses: slackapi/slack-github-action@v2.0.0
      with:
        webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
        webhook-type: incoming-webhook
        payload: |
          {
            "channel": "#web",
            "username": "GitHub Actions",
            "icon_emoji": ":github:",
            "attachments": [
              {
                "color": "danger",
                "title": "❌ jkcoukblog Build Failed",
                "text": "jkcoukblog deployment failed!",
                "fields": [
                  {
                    "title": "Trigger",
                    "value": "${{ github.event_name == 'workflow_dispatch' && format('Manual by {0}', github.actor) || format('Commit by {0}', github.event.head_commit.author.name || github.actor) }}",
                    "short": true
                  },
                  {
                    "title": "Branch",
                    "value": "${{ github.ref_name }}",
                    "short": true
                  },
                  {
                    "title": "Message",
                    "value": "${{ github.event.head_commit.message || 'Manual workflow dispatch' }}",
                    "short": false
                  }
                ],
                "footer": "Please check the GitHub Actions logs for details",
                "footer_icon": "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png",
                "actions": [
                  {
                    "type": "button",
                    "text": "View Workflow Logs",
                    "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                ]
              }
            ]
          }
